<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8b5cf6" flood-opacity="0.4" />
    </filter>
  </defs>
  <!-- Rounded dark background container -->
  <rect width="512" height="512" rx="128" fill="#0b0f19" />
  
  <!-- Stylized PerX logo symbol -->
  <g filter="url(#shadow)">
    <!-- Elegant neon geometric Cloud and 'P' path -->
    <path d="M180,140 L310,140 C370,140 400,180 400,225 C400,270 370,310 310,310 L240,310 L240,380 L180,380 Z" fill="none" stroke="url(#glow)" stroke-width="28" stroke-linejoin="round" stroke-linecap="round" />
    <path d="M240,310 L310,310" fill="none" stroke="url(#glow)" stroke-width="28" stroke-linecap="round" />
    
    <!-- Cloud-like puff/arc on the left to merge Cloud + P concepts -->
    <path d="M140,280 C110,280 110,240 130,220 C110,190 140,160 170,180" fill="none" stroke="url(#glow)" stroke-width="24" stroke-linecap="round" />
    
    <!-- Mini gamification star spark -->
    <path d="M370,110 L380,135 L410,145 L380,155 L370,180 L360,155 L330,145 L360,135 Z" fill="#38bdf8" />
  </g>
</svg>
